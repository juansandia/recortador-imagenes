name: Compilar a EXE Unico

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias y PyInstaller
        run: |
          pip install pillow pyinstaller

      - name: Compilar Script a un solo EXE
        run: |
          pyinstaller --noconfirm --onefile --windowed main.py

      - name: Guardar y empaquetar ejecutable
        uses: actions/upload-artifact@v4
        with:
          name: programa-recortador-unico
          path: dist/main.exe
